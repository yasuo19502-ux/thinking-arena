[theme]
primaryColor = "#4F46E5"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[server]
headless = true
# Không đặt port ở đây — Streamlit Cloud tự gán cổng.
# Chạy local (tránh xung đột 8501): streamlit run app.py --server.port 8502

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
